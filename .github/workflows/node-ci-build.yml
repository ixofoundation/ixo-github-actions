name: Build and Release

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '24'
      package_manager:
        required: false
        type: string
        default: 'yarn'
      skip_ci:
        required: false
        type: boolean
        default: false
      commit_sha:
        required: true
        type: string
      docker_image_scanning:
        required: false
        type: boolean
        default: true
      root_path:
        required: false
        type: string
        description: 'For builds in sub-directories, provide the path. Leave empty for repo root.'
        default: ''

permissions:
  contents: write
  packages: write
  security-events: write
  issues: write
  pull-requests: write

jobs:
  validate-commit:
    name: 'Validate Commit'
    #runs-on: buildjet-4vcpu-ubuntu-2204
    runs-on: ubuntu-latest
    outputs:
      is_merge_commit: ${{ steps.check_merge_commit.outputs.is_merge_commit }}
    steps:
      - name: Checkout minimal depth
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.commit_sha }}

      - name: Check if commit is a merge from main/master to develop
        id: check_merge_commit
        run: |
          if git log -1 --pretty=%B | grep -qE 'Merge (branch|pull request) .* into develop'; then
            echo "is_merge_commit=true" >> $GITHUB_OUTPUT
          else
            echo "is_merge_commit=false" >> $GITHUB_OUTPUT
          fi
  release:
    name: 'Semantic Release NodeJS'
    #runs-on: buildjet-4vcpu-ubuntu-2204
    runs-on: ubuntu-latest
    needs: validate-commit
    if: ${{ needs.validate-commit.outputs.is_merge_commit == 'false' }}
    strategy:
      matrix:
        node-version: [ "${{ inputs.node_version }}" ]
    outputs:
      NEW_TAG: ${{ steps.tag-version-non-develop.outputs.NEW_TAG || steps.tag-version-develop.outputs.NEW_TAG }}
    defaults:
      run:
        working-directory: ${{ inputs.root_path || '.' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: '0'
          token: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        if: ${{ inputs.package_manager == 'pnpm' }}
        with:
          version: 10.0

      - name: Setup bun
        uses: oven-sh/setup-bun@v1
        if: ${{ inputs.package_manager == 'bun' }}
        with:
          bun-version: latest

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        if: ${{ inputs.package_manager != 'bun' }}
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ inputs.package_manager }}
          cache-dependency-path: ${{ format('{0}/{1}', inputs.root_path || '.', inputs.package_manager == 'pnpm' && 'pnpm-lock.yaml' || (inputs.package_manager == 'yarn' && 'yarn.lock' || 'package-lock.json')) }}

      - name: Install dependencies yarn
        if: ${{ inputs.package_manager == 'yarn' }}
        run: yarn install --frozen-lockfile

      - name: Install dependencies pnpm
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: pnpm install --frozen-lockfile

      - name: Install dependencies npm
        if: ${{ inputs.package_manager == 'npm' }}
        run: npm install --frozen-lockfile
      
      - name: Install dependencies bun
        if: ${{ inputs.package_manager == 'bun' }}
        run: bun install --frozen-lockfile

      - name: Run Build pnpm
        if: ${{ !inputs.skip_ci && inputs.package_manager == 'pnpm' }}
        run: pnpm build

      - name: Run Build yarn
        run: yarn build
        if: ${{ !inputs.skip_ci && inputs.package_manager == 'yarn' }}

      - name: Run build npm
        run: npm run build
        if: ${{ !inputs.skip_ci && inputs.package_manager == 'npm' }}

      - name: Run build bun
        run: bun run build
        if: ${{ !inputs.skip_ci && inputs.package_manager == 'bun' }}

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        
      - name: Get release tag version (non-develop)
        if: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/dev' }}
        id: tag-version-non-develop
        run: |
          # Exclude develop/dev pre-release tags — fetch-depth: 0 pulls all tags from all branches,
          # and pre-release tags like 1.0.0-develop.1 sort higher than real releases like 0.9.x
          # `--` terminates grep option parsing so the leading `-` in the pattern is not read as a flag (grep 3.8+ on ubuntu-24 is strict).
          LATEST_TAG=$(git tag --sort=v:refname | grep -vE -- '-(develop|dev)\.[0-9]+$' | tail -n 1)

          echo "NEW_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Get release tag version (develop)
        if: ${{ github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/dev' }}
        id: tag-version-develop
        run: |
          # Fetch the latest tag (matches tags containing 'develop' or 'dev')
          LATEST_TAG=$(git tag --sort=v:refname | grep -E '(develop|dev)' | tail -n 1)
          
          echo "NEW_TAG=$LATEST_TAG" >> "$GITHUB_OUTPUT"

  release-docker:
    name: 'Build and Release Docker Image'
    #runs-on: buildjet-4vcpu-ubuntu-2204
    runs-on: ubuntu-latest
    needs: release
    env:
      IMAGE_NAME: ${{ github.repository }}:${{ needs.release.outputs.NEW_TAG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}
          fetch-depth: 1
          token: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.root_path || '.' }}
          file: ${{ inputs.root_path && format('{0}/Dockerfile', inputs.root_path) || './Dockerfile' }}
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}

  security-scan:
    name: 'Docker Security Scan'
    #runs-on: buildjet-4vcpu-ubuntu-2204
    runs-on: ubuntu-latest
    needs: [release, release-docker]
    if: ${{ inputs.docker_image_scanning }}
    continue-on-error: false
    env:
      IMAGE_NAME: ${{ github.repository }}:${{ needs.release.outputs.NEW_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha }}

      - name: Run Trivy vulnerability scanner for readable output # Readable from Logs
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        if: always()
        with:
          image-ref: 'ghcr.io/${{ env.IMAGE_NAME }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: false
        with:
          image-ref: 'ghcr.io/${{ env.IMAGE_NAME }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          limit-severities-for-sarif: true

      # - name: Upload Trivy scan results to GitHub Security tab # Populate to Github, TODO look into if this is needed
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-results.sarif'