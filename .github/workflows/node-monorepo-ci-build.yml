name: Build and Release

on:
  workflow_call:
    inputs:
      docker_image_scanning:
        required: false
        type: boolean
        default: true
      devnet_branches_override:
        required: false
        type: string
        description: 'Comma-separated list of branches that map to devnet (e.g., "develop,dev,custom-dev")'
      testnet_branches_override:
        required: false
        type: string
        description: 'Comma-separated list of branches that map to testnet (e.g., "main,master,stage")'
      mainnet_branches_override:
        required: false
        type: string
        description: 'Comma-separated list of branches that map to mainnet (e.g., "prod,production")'
      devnet_tag_suffix:
        required: false
        type: boolean
        default: true
        description: 'When true (default), appends -develop.<run_number> to the image/app version for devnet builds only. Set to false to opt a caller out.'

jobs:
  branch-mapping:
    name: 'Branch to Environment'
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.environment.outputs.environment }}
      also_mainnet: ${{ steps.environment.outputs.also_mainnet }}
    steps:
      - name: Branch Mapping
        id: environment
        run: |
          BRANCH_NAME=$(echo "${{ github.ref }}" | sed 's|refs/heads/||')
          ENVIRONMENT=""
          ALSO_MAINNET="false"

          # Check devnet: use override if provided, otherwise use defaults
          if [ -n "${{ inputs.devnet_branches_override }}" ]; then
            IFS=',' read -ra DEVNET_BRANCHES <<< "${{ inputs.devnet_branches_override }}"
            for branch in "${DEVNET_BRANCHES[@]}"; do
              BRANCH_TRIM=$(echo "$branch" | xargs)
              if [ -n "$BRANCH_TRIM" ] && [ "$BRANCH_NAME" = "$BRANCH_TRIM" ]; then
                ENVIRONMENT="devnet"
                break
              fi
            done
          else
            # Default devnet branches
            if [ "$BRANCH_NAME" = "develop" ] || [ "$BRANCH_NAME" = "dev" ]; then
              ENVIRONMENT="devnet"
            fi
          fi

          # Check testnet: use override if provided, otherwise use defaults (only if not already matched)
          if [ -z "$ENVIRONMENT" ]; then
            if [ -n "${{ inputs.testnet_branches_override }}" ]; then
              IFS=',' read -ra TESTNET_BRANCHES <<< "${{ inputs.testnet_branches_override }}"
              for branch in "${TESTNET_BRANCHES[@]}"; do
                BRANCH_TRIM=$(echo "$branch" | xargs)
                if [ -n "$BRANCH_TRIM" ] && [ "$BRANCH_NAME" = "$BRANCH_TRIM" ]; then
                  ENVIRONMENT="testnet"
                  break
                fi
              done
            else
              # Default testnet branches
              if [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ] || [ "$BRANCH_NAME" = "stage" ]; then
                ENVIRONMENT="testnet"
                # main/master also trigger a mainnet approval-gated deploy when no mainnet override is set
                if [ -z "${{ inputs.mainnet_branches_override }}" ] && { [ "$BRANCH_NAME" = "main" ] || [ "$BRANCH_NAME" = "master" ]; }; then
                  ALSO_MAINNET="true"
                fi
              fi
            fi
          fi

          # Check mainnet: use override if provided, otherwise use defaults (only if not already matched)
          if [ -z "$ENVIRONMENT" ]; then
            if [ -n "${{ inputs.mainnet_branches_override }}" ]; then
              IFS=',' read -ra MAINNET_BRANCHES <<< "${{ inputs.mainnet_branches_override }}"
              for branch in "${MAINNET_BRANCHES[@]}"; do
                BRANCH_TRIM=$(echo "$branch" | xargs)
                if [ -n "$BRANCH_TRIM" ] && [ "$BRANCH_NAME" = "$BRANCH_TRIM" ]; then
                  ENVIRONMENT="mainnet"
                  break
                fi
              done
            else
              # Default mainnet branches
              if [ "$BRANCH_NAME" = "prod" ] || [ "$BRANCH_NAME" = "production" ]; then
                ENVIRONMENT="mainnet"
              fi
            fi
          fi

          if [ -z "$ENVIRONMENT" ]; then
            echo "::error::Unsupported branch: $BRANCH_NAME"
            exit 1
          fi

          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "also_mainnet=$ALSO_MAINNET" >> "$GITHUB_OUTPUT"
  # We create a PR Release if there is a changesets file. if there is no changesets file and a package.json version is updated (e.g. merged PR), it is a Release.
  release:
    name: "[Create PR Release] OR [Create Github Tags & Release]"
    permissions:
      contents: write
      packages: write
      pull-requests: write
    timeout-minutes: 20
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changeset.outputs.published }}
      publishedPackages: ${{ steps.changeset.outputs.publishedPackages }}
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v3

      - name: "Setup Pnpm 10.0"
        uses: pnpm/action-setup@v2
        with:
          version: 10.0

      - name: "Install dependencies"
        run: pnpm install --frozen-lockfile

      # Callers may run changesets pre-release mode (.changeset/pre.json) on one
      # long-lived branch (e.g. develop). If that file reaches another branch via a
      # merge, changesets/action's own hasChangesets check filters out every pending
      # changeset already listed in pre.json's "changesets" array as consumed by the
      # other branch's prerelease cycle, and silently skips straight to publish with
      # nothing to release. Strip it here, before changesets/action runs, whenever
      # its tag doesn't match the current branch, and push that removal directly so
      # a polluted run just self-heals into a second clean run instead of no-op'ing.
      # Sets `clean=true` when it's safe for this run to release (no pre.json, or a
      # pre.json that genuinely belongs to this branch). Sets `clean=false` only when
      # it just deleted and pushed a stray pre.json -- that push starts a fresh CI
      # run which will see `clean=true` and do the actual release; THIS run stops
      # here since changesets/action would otherwise misread the leftover state.
      - name: "Strip stray changesets pre-release flag"
        id: strip-pre
        run: |
          if [ ! -f .changeset/pre.json ]; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PRE_TAG=$(node -p "require('./.changeset/pre.json').tag")
          if [ "$PRE_TAG" = "$GITHUB_REF_NAME" ]; then
            echo "clean=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::.changeset/pre.json (tag: $PRE_TAG) doesn't belong on branch $GITHUB_REF_NAME; removing it and re-triggering a clean run"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .changeset/pre.json
          git commit -m "chore: strip stray changesets pre-release flag"
          git push origin HEAD:"$GITHUB_REF_NAME"
          echo "clean=false" >> "$GITHUB_OUTPUT"

      - name: "Create Release Pull Request"
        id: changeset
        if: steps.strip-pre.outputs.clean == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: new release"
          title: "chore: new release candidate"
          createGithubReleases: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{secrets.npm_token}}
  release-docker:
    name: 'Build and Release Docker Image(s)'
    runs-on: ubuntu-latest #buildjet-4vcpu-ubuntu-2204
    needs: [release, branch-mapping]
    if: needs.release.outputs.published == 'true'
    strategy:
      matrix:
        package: ${{ fromJSON(needs.release.outputs.publishedPackages) }}
    env:
      IMAGE_TAG: ${{ inputs.devnet_tag_suffix && needs.branch-mapping.outputs.environment == 'devnet' && format('{0}-develop.{1}', matrix.package.version, github.run_number) || matrix.package.version }}
    steps:
      - name: Set image name
        id: set-image-name
        run: |
          PACKAGE_NAME="${{ matrix.package.name }}"
          FORMATTED_NAME="${PACKAGE_NAME//@/}"
          FORMATTED_NAME="${FORMATTED_NAME//\//-}"
          echo "image_name=ghcr.io/${{ github.repository }}/${FORMATTED_NAME}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          file: ./Dockerfile
          build-args: |
            PROJECT=${{ matrix.package.name }}
          push: true
          tags: |
            ${{ steps.set-image-name.outputs.image_name }}:${{ env.IMAGE_TAG }}
            ${{ steps.set-image-name.outputs.image_name }}:latest
  security-scan:
    name: 'Docker Security Scan'
    runs-on: ubuntu-latest
    needs: [release, release-docker, branch-mapping]
    if: needs.release.outputs.published == 'true' && inputs.docker_image_scanning
    continue-on-error: true
    strategy:
      matrix:
        package: ${{ fromJSON(needs.release.outputs.publishedPackages) }}
    env:
      IMAGE_TAG: ${{ inputs.devnet_tag_suffix && needs.branch-mapping.outputs.environment == 'devnet' && format('{0}-develop.{1}', matrix.package.version, github.run_number) || matrix.package.version }}
    steps:
      - name: Set image name # Duplicated from release-docker job due to matrix strategy limitations
        id: set-image-name
        run: |
          PACKAGE_NAME="${{ matrix.package.name }}"
          FORMATTED_NAME="${PACKAGE_NAME//@/}"
          FORMATTED_NAME="${FORMATTED_NAME//\//-}"
          echo "image_name=ghcr.io/${{ github.repository }}/${FORMATTED_NAME}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: '${{ steps.set-image-name.outputs.image_name }}:${{ env.IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true
          exit-code: '1'
          limit-severities-for-sarif: true

      # - name: Upload Trivy scan results to GitHub Security tab # Populate to Github , TODO look into if this is needed
      #   uses: github/codeql-action/upload-sarif@v3
      #   if: always()
      #   with:
      #     sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner for readable output # Readable from Logs
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        if: always()
        with:
          image-ref: '${{ steps.set-image-name.outputs.image_name }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          limit-severities-for-sarif: true